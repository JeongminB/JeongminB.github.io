---
layout: archive
author_profile: true
---

<ul class="posts-list">
  {% assign category = page.category | default: page.title %}
  <div class="entries-{{ page.entries_layout | default: 'list' }}">
  {% for post in site.categories[category] %}
    {% include archive-single.html type=page.entries_layout %}
  {% endfor %}
  </div>
</ul>
